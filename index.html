<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة البث المباشر للمباراة</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .video-container {
            position: relative;
            padding-top: 56.25%; /* نسبة 16:9 لضبط أبعاد الشاشة */
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ شاشة البث المباشر للمباراة</h1>
    
    <div class="video-container">
        <!-- تحويل رابط السيرفر المباشر إلى iframe -->
        <iframe src="http://ugeen.live:8080/Ugeen_VIPDyFKsG/9BPK3X/4504" 
                allowfullscreen 
                allow="autoplay; encrypted-media">
        </iframe>
    </div>
</div>

</body>
</html>
