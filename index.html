<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK Sport Live</title>
    <!-- استدعاء مكتبة المشغل الاحترافي لإخفاء معالم اليوتيوب تماماً -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        /* ضبط أبعاد المشغل لملء الشاشة بالكامل */
        .plyr, .plyr__video-wrapper {
            width: 100% !important;
            height: 100% !important;
        }
        /* إخفاء شريط الوقت وأزرار التحكم تماماً لجعلها تبدو كبث مباشر */
        .plyr__controls, .plyr__control--overlaid, .plyr__volume {
            display: none !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }
        /* منع أي نقرات على الفيديو لإخفاء أي عناصر لليوتيوب */
        .plyr--video iframe {
            pointer-events: none !important;
        }
        /* تصميم اللوجو المصغر الثابت في أعلى جهة الشمال (اليسار) */
        .watermark-logo {
            position: absolute;
            top: 15px; 
            left: 15px; 
            z-index: 99999; /* لضمان الظهور فوق المشغل الجديد */
            background-color: #4a148c; 
            color: #ffffff;
            font-weight: bold;
            font-size: 14px; /* حجم خط صغير ومناسب */
            padding: 6px 14px; /* أبعاد أصغر ومتناسقة */
            border-radius: 30px; 
            box-shadow: 0px 3px 8px rgba(0,0,0,0.5);
            user-select: none;
            pointer-events: none; 
            letter-spacing: 0.5px;
            border: 2px solid #ffffff;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- حاوية المشغل الذكي المرتبطة باليوتيوب -->
        <div id="player" data-plyr-provider="youtube" data-plyr-embed-id="yfR_HprJx7s"></div>

        <!-- شعار MK Sport المصغر في أعلى الشمال -->
        <div class="watermark-logo">
            MK SPORT
        </div>
    </div>

    <!-- ملف تشغيل المكتبة الذكية -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        // إعدادات المشغل: تشغيل تلقائي، كتم الصوت لضمان العمل، وتكرار مستمر
        const player = new Plyr('#player', {
            autoplay: true,
            muted: true,
            loop: { active: true },
            controls: [], /* مصفوفة فارغة تعني حذف كل أزرار التحكم تماماً */
            fullscreen: { enabled: false },
            keyboard: { global: false, focused: false }
        });

        // تأكيد التشغيل التلقائي فور جاهزية المشغل
        player.on('ready', () => {
            player.play();
        });
    </script>
</body>
</html>
