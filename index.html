<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK Sport Live</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        /* حاوية الفيديو لملء الشاشة */
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: auto; /* يسمح بالتفاعل مع أزرار الفيديو إذا لزم الأمر */
        }
        /* كود اللوجو الثابت فوق الشعار */
        .watermark-logo {
            position: absolute;
            top: 20px; /* المسافة من الأعلى */
            right: 20px; /* المسافة من اليمين لتغطية الشعار */
            z-index: 9999; /* لضمان ظهور اللوجو فوق الفيديو دائماً */
            background-color: #4a148c; /* لون بنفسجي مطابق لخلفية اللوجو المرفق */
            color: #ffffff;
            font-weight: bold;
            font-size: 20px;
            padding: 10px 20px;
            border-radius: 25px; /* حواف دائرية تشبه تصميم اللوجو المرفق */
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            user-select: none;
            pointer-events: none; /* يمنع النقر على اللوجو بالخطأ */
            letter-spacing: 1px;
            border: 2px solid #ffffff;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- كود مشغل يوتيوب مع إعدادات التشغيل التلقائي والتكرار والبث -->
        <iframe 
            src="https://www.youtube.com/embed/N3X5_HAAvy8?autoplay=1&loop=1&playlist=N3X5_HAAvy8&mute=1&controls=1&rel=0&showinfo=0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>

        <!-- شعار MK Sport الثابت -->
        <div class="watermark-logo">
            MK SPORT
        </div>
    </div>

</body>
</html>
