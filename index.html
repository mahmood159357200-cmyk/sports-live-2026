<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشغل القنوات</title>
    <!-- استدعاء المكتبات -->
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        body { margin: 0; background: #000; }
        #player { width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <div id="player"></div>

    <script>
        try {
            var player = new Clappr.Player({
                source: "http://ugeen.live:8080/Ugeen_VIPDyFKsG/9BPK3X/459",
                parentId: "#player",
                width: "100%",
                height: "100%",
                autoPlay: true,
                // إعدادات إضافية لضمان عمل روابط Xtream
                plugins: [], 
            });
            console.log("المشغل يعمل بنجاح");
        } catch (e) {
            console.error("خطأ في تشغيل المشغل: ", e);
            document.body.innerHTML = "<h2 style='color:white; text-align:center;'>حدث خطأ في تحميل المشغل، تأكد من الاتصال</h2>";
        }
    </script>
</body>
</html>
