<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>البث المباشر</title>
    <style>
        /* تصفير الهوامش وجعل الخلفية سوداء بالكامل */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden; /* إخفاء أشرطة التمرير */
        }

        /* جعل المشغل يملأ كامل طول وعرض الشاشة */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- تم إزالة الـ Sandbox ليتخطى حماية السيرفر ويعمل البث بنجاح -->
    <iframe 
        src="https://player.syria-player.live/albaplayer/beinmax1/?serv=0" 
        allowfullscreen="true" 
        frameborder="0" 
        scrolling="no">
    </iframe>

</body>
</html>
