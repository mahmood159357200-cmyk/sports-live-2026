<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>البث المباشر المطور</title>
    <style>
        /* تصفير الهوامش وجعل الصفحة سوداء بالكامل لتجربة سينمائية */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden; /* إخفاء أي أشرطة تمرير خارجية */
        }

        /* جعل المشغل يملأ الشاشة بالكامل على أي هاتف */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- الكود المطور لمنع النوافذ المنبثقة وملء الشاشة بالكامل -->
    <iframe 
        src="https://player.syria-player.live/albaplayer/beinmax1/?serv=0" 
        allowfullscreen="true" 
        frameborder="0" 
        scrolling="no"
        sandbox="allow-scripts allow-same-origin allow-forms">
    </iframe>

</body>
</html>
