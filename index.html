<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نهائي كأس العالم 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh}
.wrap{width:100%;max-width:1100px}
.frame{position:relative;width:100%;min-height:100vh;border-radius:0;overflow:hidden;background:#000;display:flex;flex-direction:column}
.bg{position:absolute;inset:0;background:radial-gradient(70% 90% at 20% 50%,rgba(198,11,30,.65) 0%,transparent 60%),radial-gradient(70% 90% at 80% 50%,rgba(60,120,200,.65) 0%,transparent 60%),linear-gradient(105deg,#0a0a12,#1a0e1a 45%,#0a1525)}
.content{position:relative;z-index:2;display:flex;flex-direction:column;min-height:100vh;padding:16px 12px;gap:14px;justify-content:space-between}
.top{display:flex;justify-content:center}
.top span{background:#000;color:#fff;font-size:10px;padding:6px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.15)}
.teams{display:flex;align-items:center;justify-content:space-between;padding:10px 5%}
.avatar{width:78px;aspect-ratio:1;border-radius:50%;overflow:hidden;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;flex-shrink:0}
.avatar.arg{background:linear-gradient(90deg,#74ACDF 33%,#fff 33%,#fff 66%,#74ACDF 66%);color:#000}
.avatar.spain{background:linear-gradient(180deg,#C60B1E 25%,#FFC400 25%,#FFC400 75%,#C60B1E 75%)}
.t-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.trophy{font-size:42px}
.vs{background:#FFD700;color:#000;font-weight:900;padding:4px 14px;border-radius:999px;font-size:12px}
.title{text-align:center}
.title h1{color:#fff;font-size:15px;line-height:1.4}
.title h1 span{color:#FFD700}
.countdown{display:flex;gap:8px;justify-content:center;padding:0 4px}
.box{flex:1;background:rgba(255,255,255,.12);border:1px solid rgba(255,215,0,.35);border-radius:16px;padding:14px 4px;text-align:center}
.num{font-weight:900;color:#fff;font-size:26px}
.ar{color:#FFD700;font-size:10px;display:block}
.en{color:rgba(255,255,255,.5);font-size:7px;display:block}
.broadcast{margin-top:4px;background:linear-gradient(90deg,rgba(255,215,0,.15),rgba(255,215,0,.05));border:1px solid rgba(255,215,0,.4);border-radius:12px;padding:10px 12px;display:flex;align-items:center;justify-content:center;gap:8px;animation:glow2 2s infinite}
.dot{width:8px;height:8px;background:#00ff6a;border-radius:50%;box-shadow:0 0 10px #00ff6a;animation:blink 1s infinite;flex-shrink:0}
.broadcast span{color:#FFD700;font-weight:800;font-size:11px;text-align:center}
.broadcast.live{background:linear-gradient(90deg,rgba(255,0,0,.25),rgba(255,215,0,.15));border-color:#ff3b3b}
.broadcast.live .dot{background:#ff3b3b;box-shadow:0 0 10px #ff3b3b}
.broadcast.live span{color:#fff}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes glow2{0%,100%{box-shadow:0 0 10px rgba(255,215,0,.1)}50%{box-shadow:0 0 20px rgba(255,215,0,.25)}}
.bottom{display:flex;justify-content:space-between;gap:6px;flex-wrap:wrap}
.pill{background:rgba(255,255,255,.08);color:#fff;border-radius:999px;padding:5px 10px;font-size:9px}
</style>
</head>
<body>
<div class="wrap">
<div class="frame">
<div class="bg"></div>
<div class="content">
<div class="top"><span>WORLD CUP 2026 • FINAL • METLIFE STADIUM</span></div>
<div class="teams">
<div style="text-align:center"><div class="avatar arg">10</div><div style="color:#fff;font-weight:900;margin-top:6px;font-size:12px">ARGENTINA</div></div>
<div class="t-center"><div class="trophy">🏆</div><div class="vs">VS</div></div>
<div style="text-align:center"><div class="avatar spain">ES</div><div style="color:#fff;font-weight:900;margin-top:6px;font-size:12px">ESPAÑA</div></div>
</div>
<div class="title"><h1>نهائي الأحلام - <span>إسبانيا ضد الأرجنتين</span> - الأحد 19 يوليو 2026</h1></div>
<div class="countdown" id="cd">
<div class="box"><div class="num" id="d">00</div><span class="ar">يوم</span><span class="en">DAYS</span></div>
<div class="box"><div class="num" id="h">00</div><span class="ar">ساعة</span><span class="en">HOURS</span></div>
<div class="box"><div class="num" id="m">00</div><span class="ar">دقيقة</span><span class="en">MINS</span></div>
<div class="box"><div class="num" id="s">00</div><span class="ar">ثانية</span><span class="en">SECS</span></div>
</div>
<div class="broadcast" id="broadcast">
<div class="dot"></div>
<span id="bText">📡 البث المباشر سيبدأ هنا قبل المباراة بـ 30 دقيقة</span>
</div>
<div class="bottom"><div class="pill">⏰ 10:00 PM EEST</div><div class="pill" style="background:rgba(255,215,0,.15);color:#FFD700">📺 beIN MAX 1 + FOX</div></div>
</div>
</div>
</div>
<script>
const TARGET=new Date("2026-07-19T22:00:00+03:00").getTime();
const BROADCAST_START=TARGET-30*60*1000;
const d=document.getElementById('d'),h=document.getElementById('h'),m=document.getElementById('m'),s=document.getElementById('s');
const bBox=document.getElementById('broadcast'),bText=document.getElementById('bText');
function update(){
const now=Date.now();
const diff=TARGET-now;
if(diff<=0){
document.getElementById('cd').innerHTML='<div style="width:100%;background:#FFD700;padding:2px;border-radius:14px"><div style="background:#000;border-radius:12px;padding:12px;text-align:center;color:#fff;font-weight:900">🔴 المباراة جارية الآن</div></div>';
bBox.classList.add('live');
bText.innerHTML='🔴 البث المباشر الآن - اضغط للمشاهدة';
return;
}
if(now>=BROADCAST_START){
bBox.classList.add('live');
bText.innerHTML='🔴 البث المباشر يبدأ الآن - الاستوديو التحليلي مباشر';
}
d.textContent=String(Math.floor(diff/86400000)).padStart(2,'0');
h.textContent=String(Math.floor(diff/3600000%24)).padStart(2,'0');
m.textContent=String(Math.floor(diff/60000%60)).padStart(2,'0');
s.textContent=String(Math.floor(diff/1000%60)).padStart(2,'0');
}
setInterval(update,1000);update();
</script>
</body>
</html>
