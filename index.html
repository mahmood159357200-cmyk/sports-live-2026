<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MK SPORT - البث المباشر</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
  html,body{height:100%;height:100dvh;overflow:hidden;background:#05070A;}
  .wrap{
    height:100vh;height:100dvh;width:100vw;
    position:relative;overflow:hidden;
    display:flex;flex-direction:column;
    background:#000;
  }
  .bg{
    position:absolute;inset:0;overflow:hidden;
  }
  .bg img{
    width:100%;height:100%;object-fit:cover;
    animation: ken 20s ease-in-out infinite alternate;
  }
  @keyframes ken{0%{transform:scale(1)}100%{transform:scale(1.08)}}
  .overlay1{position:absolute;inset:0;background:radial-gradient(115% 88% at 50% 38%, transparent 20%, rgba(5,7,10,0.6) 70%, rgba(5,7,10,0.98) 100%);}
  .overlay2{position:absolute;inset:0;background:linear-gradient(to top, #05070A 0%, rgba(5,7,10,0.8) 45%, transparent 100%);}
  .content{
    position:relative;z-index:2;
    height:100%;display:flex;flex-direction:column;
    justify-content:space-between;align-items:center;
    padding:14px 16px;
    padding-top:max(14px, env(safe-area-inset-top));
    padding-bottom:max(8px, env(safe-area-inset-bottom));
  }
  .top{display:flex;justify-content:space-between;width:100%;align-items:center;}
  .logo-top{font-weight:900;letter-spacing:0.12em;font-size:14px;color:white;}
  .logo-top span{color:#00D1FF}
  .live-badge{
    display:flex;align-items:center;gap:8px;
    background:rgba(15,20,30,0.85);backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,0.08);
    padding:6px 12px;border-radius:100px;
  }
  .dot{width:8px;height:8px;background:#ef4444;border-radius:50%;box-shadow:0 0 0 0 rgba(239,68,68,0.7);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,0.7)}70%{box-shadow:0 0 0 8px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
  .center{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:16px;width:100%;max-width:800px;
  }
  .mk-title{
    font-weight:900;line-height:0.85;text-align:center;
    font-size:clamp(52px, 13vw, 120px);
    text-shadow:0 8px 40px rgba(0,0,0,0.8);
  }
  .mk-title .w{color:white;display:block}
  .mk-title .b{color:#00D1FF;display:block;margin-top:-0.1em;text-shadow:0 0 30px rgba(0,209,255,0.7)}
  .headline{
    font-size:clamp(16px, 3.2vw, 24px);font-weight:800;color:white;text-align:center;
  }
  .headline span{color:rgba(255,255,255,0.5)}
  .leagues-box{
    width:100%;max-width:760px;
    background:linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    padding:1px;border-radius:20px;backdrop-filter:blur(20px);
  }
  .leagues-inner{
    background:linear-gradient(180deg, rgba(14,18,26,0.92), rgba(8,10,15,0.92));
    border-radius:19px;padding:12px 10px;
    border:1px solid rgba(255,255,255,0.04);
  }
  .pills{display:flex;flex-wrap:wrap;justify-content:center;gap:7px}
  .pill{
    display:flex;align-items:center;gap:6px;
    height:34px;padding:0 14px;border-radius:100px;
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
    color:white;font-size:12px;font-weight:700;
    backdrop-filter:blur(10px);
  }
  .pill.highlight{background:rgba(255,255,255,0.08);border-color:rgba(0,209,255,0.25)}
  .pill .code{
    width:20px;height:20px;border-radius:50%;display:grid;place-items:center;
    font-size:8px;font-weight:900;background:rgba(0,209,255,0.15);border:1px solid rgba(0,209,255,0.2);color:#00D1FF;
  }
  .live-d{width:6px;height:6px;background:#10b981;border-radius:50%;animation:pulse2 1.5s infinite}
  @keyframes pulse2{0%,100%{opacity:1}50%{opacity:0.4}}
  .footer{
    width:100%;height:34px;display:flex;align-items:center;justify-content:center;
    gap:10px;border-top:1px solid rgba(255,255,255,0.05);
    background:rgba(5,7,10,0.7);backdrop-filter:blur(10px);
    font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:0.15em;
  }
  @media (max-height:700px){
    .mk-title{font-size:clamp(40px, 10vw, 90px)}
    .center{gap:10px}
    .pill{height:30px;font-size:11px;padding:0 10px}
  }
  @media (max-width:480px){
    .pills{gap:6px}
    .pill{height:30px;font-size:10.5px}
  }
</style>
</head>
