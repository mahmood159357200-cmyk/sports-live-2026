<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر بدون إعلانات</title>
    <style>
        /* كود لجعل الفيديو يملأ الشاشة بالكامل بدون حواف */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- 
      - تم إضافة خواص لمنع النوافذ المنبثقة والإعلانات (sandbox)
      - تم إضافة (autoplay=1) لمحاولة التشغيل التلقائي
      - تم تفعيل ميزة ملء الشاشة (allowfullscreen)
    -->
    <iframe 
        src="https://fy.onlineworldcupfifa.com/albaplayer/sports-1/?autoplay=1&muted=1" 
        allow="autoplay; fullscreen; picture-in-picture" 
        allowfullscreen="true" 
        scrolling="no"
        sandbox="allow-scripts allow-same-origin allow-forms allow-presentation">
    </iframe >

</body>
</html>
