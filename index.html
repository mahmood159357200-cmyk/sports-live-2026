<!DOCTYPE html>
<html dir="rtl">
<head><meta charset="UTF-8">
<style>
body{margin:0;width:100vw;height:100vh;background:radial-gradient(#6A0DAD,#4B0082);display:flex;align-items:center;justify-content:center;overflow:hidden}
.slide{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100vw;font-size:90px;font-weight:900;color:#fff;text-align:center;text-shadow:0 0 20px gold;opacity:0;animation:show 24s infinite}
.slide:nth-child(1){animation-delay:0s} .slide:nth-child(2){animation-delay:3s}
.slide:nth-child(3){animation-delay:6s} .slide:nth-child(4){animation-delay:9s}
.slide:nth-child(5){animation-delay:12s} .slide:nth-child(6){animation-delay:15s}
.slide:nth-child(7){animation-delay:18s} .slide:nth-child(8){animation-delay:21s}
@keyframes show{0%{opacity:0;transform:translate(-50%,-40%) scale(.7)}4%{opacity:1;transform:translate(-50%,-50%)}12%{opacity:1}16%{opacity:0}100%{opacity:0}}
</style>
</head>
<body>
<div class="slide">صفحة MK Sport</div>
<div class="slide">جميع الدوريات العالمية والمحلية</div>
<div class="slide">يعرض هنا بث مباشر</div>
<div class="slide">علي صفحة MK Sport</div>
<div class="slide">انتظرونا في مباراة فرنسا وانجلترا</div>
<div class="slide">انتظرونا في مباراة الارجنتين واسبانيا</div>
<div class="slide">بث المباراة قبل بدأ المباراة بنص ساعة</div>
<div class="slide" style="color:gold;font-size:130px">MK Sport</div>
</body>
</html>
