<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK Sport Player</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* شريط اللوجو العلوي الكبير */
        .logo-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #4B0082;
            color: #fff;
            text-align: center;
            padding: 15px 0;
            font-size: 26px;
            font-weight: bold;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }

        /* اللوجو الصغير - تم ضبطه بالملّي بناءً على الصورة الأخيرة */
        .beIn-cover {
            position: absolute;
            top: 47.3vh; /* تم رفعه للأعلى ليدخل الشاشة الفنية للفيديو */
            right: 4.8vw; /* تم إزاحته لليمين ليغطي لوجو ماكس تماماً */
            background-color: #242232; /* درجة اللون الداكنة المحيطة بلوجو بين سبورت */
            color: #ffffff;
            padding: 3px 5px;
            font-size: 8.5px; /* تصغير حجم الخط ليطابق حجم لوجو القناة */
            font-weight: bold;
            font-family: sans-serif;
            border-radius: 2px;
            z-index: 9999; 
            pointer-events: none;
            border: 1px solid #333; /* إطار خفيف جداً ليتماشى مع حواف لوجو بين سبورت */
        }

        /* كود الـ iframe الشاشة الكاملة */
        .video-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- شريط اللوجو العلوي الأساسي -->
        <div class="logo-bar">
            MK Sport
        </div>

        <!-- اللوجو الصغير لداراة شعار بين سبورت ماكس -->
        <div class="beIn-cover">
            MK Sport
        </div>

        <!-- مشغل الفيديو المحمي -->
        <iframe class="video-frame" 
                src="https://fy.onlineworldcupfifa.com/albaplayer/sports-1/" 
                allowfullscreen="true" 
                scrolling="no"
                sandbox="allow-scripts allow-same-origin allow-presentation">
        </iframe>
    </div>

</body>
</html>
