<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK Sport Live</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        /* حاوية الفيديو لملء الشاشة بالكامل */
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        /* جعل مشغل اليوتيوب يغطي كامل العرض والارتفاع */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        /* شعار MK SPORT الثابت فوق شعار القناة الناقلة */
        .watermark-logo {
            position: absolute;
            top: 25px; /* المسافة من الأعلى */
            right: 25px; /* المسافة من اليمين ليغطي شعار القناة بدقة */
            z-index: 9999; /* لضمان ظهور اللوجو في المقدمة دائماً */
            background-color: #4a148c; /* اللون البنفسجي المطابق لشعارك */
            color: #ffffff;
            font-weight: bold;
            font-size: 22px;
            padding: 12px 26px;
            border-radius: 50px; /* حواف دائرية انسيابية */
            box-shadow: 0px 5px 15px rgba(0,0,0,0.6); /* تأثير ظل لإبراز اللوجو */
            user-select: none;
            pointer-events: none; /* يمنع الضغط على اللوجو بالخطأ */
            letter-spacing: 1px;
            border: 3px solid #ffffff; /* إطار أبيض يحدد اللوجو بدقة */
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- مشغل يوتيوب المطور: تشغيل تلقائي، تكرار مستمر، بدون صوت لتخطي حظر المتصفحات -->
        <iframe 
            src="https://www.youtube.com/embed/yfR_HprJx7s?autoplay=1&loop=1&playlist=yfR_HprJx7s&mute=1&controls=1&rel=0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>

        <!-- شعار MK Sport الثابت والمحمي من النقر -->
        <div class="watermark-logo">
            MK SPORT
        </div>
    </div>

</body>
</html>
