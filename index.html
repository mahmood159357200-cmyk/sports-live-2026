<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل البث المباشر - Ugeen</title>
    <!-- مكتبة تشغيل البث الذكية -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: #0c0c0c;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .player-container {
            width: 100%;
            max-width: 800px;
            background-color: #141414;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #da020e;
            box-shadow: 0 8px 24px rgba(0,0,0,0.7);
        }
        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            display: block;
        }
        .title {
            padding: 15px;
            margin: 0;
            font-size: 18px;
            text-align: center;
            background-color: #1a1a1a;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <!-- مشغل الفيديو الافتراضي -->
        <video id="video" controls autoplay playsinline></video>
        <h2 class="title">البث المباشر الحي 🔴</h2>
    </div>

    <script>
        var video = document.getElementById('video');
        // رابط البث الجديد الخاص بك
        var videoSrc = 'http://ugeen.live:8080/Ugeen_VIPDyFKsG/9BPK3X/3019';

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        }
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    </script>
</body>
</html>
