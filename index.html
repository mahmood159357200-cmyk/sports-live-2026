<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK Sport Player</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* شريط اللوجو العلوي الكبير */
        .logo-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #4B0082;
            color: #fff;
            text-align: center;
            padding: 15px 0;
            font-size: 26px;
            font-weight: bold;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }

        /* اللوجو الصغير المضبوط فوق شعار القناة بالضبط */
        .beIn-cover {
            position: absolute;
            /* الإحداثيات الجديدة لضبط المكان وسط الشاشة المظلمة */
            top: 48.5%; 
            right: 4%; 
            background-color: #201e2b; /* نفس درجة لون الشريط الأسود لشعار بين سبورت لتغطيتها بالكامل */
            color: #fff;
            padding: 2px 4px;
            font-size: 10px; /* حجم صغير جداً يطابق حجم اللوجو الأصلي */
            font-weight: bold;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-radius: 1px;
            z-index: 9999; 
            pointer-events: none; 
            box-shadow: inset 0 0 3px rgba(0,0,0,0.8);
        }

        /* كود الـ iframe الشاشة الكاملة */
        .video-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- شريط اللوجو العلوي الأساسي -->
        <div class="logo-bar">
            MK Sport
        </div>

        <!-- اللوجو الصغير المضبوط مكانه برمجياً -->
        <div class="beIn-cover">
            MK Sport
        </div>

        <!-- مشغل الفيديو المحمي -->
        <iframe class="video-frame" 
                src="https://fy.onlineworldcupfifa.com/albaplayer/sports-1/" 
                allowfullscreen="true" 
                scrolling="no"
                sandbox="allow-scripts allow-same-origin allow-presentation">
        </iframe>
    </div>

</body>
</html>
