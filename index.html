<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MK SPORT - نهائي كأس العالم 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Cairo',sans-serif}.wrap{width:100vw;height:100vh;height:100dvh;display:flex;justify-content:center;align-items:center;background:#000}.frame{position:relative;width:100%;height:100%;max-width:480px;margin:0 auto;overflow:hidden;background:linear-gradient(135deg,#4B0082,#8A2BE2,#9400D3,#6A0DAD);display:flex;flex-direction:column}@media(min-width:768px){.frame{max-width:420px;border-radius:24px;border:3px solid rgba(255,255,255,.15);box-shadow:0 0 80px rgba(138,43,226,.6);height:90vh;max-height:860px}}.bg{position:absolute;inset:0;background:radial-gradient(80% 60% at 50% 20%,rgba(255,255,255,.15),transparent 60%)}.content{position:relative;z-index:2;display:flex;flex-direction:column;height:100%;padding:14px 14px 12px;gap:12px;justify-content:space-between}.top-logo{display:flex;flex-direction:column;align-items:center;gap:8px}.logo-img{width:165px;height:auto;filter:drop-shadow(0 4px 18px rgba(0,0,0,.5)) drop-shadow(0 0 12px rgba(255,255,255,.6));animation:logoPulse 2.5s infinite}.top-badge{background:rgba(0,0,0,.7);color:#fff;font-size:9px;padding:5px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.2)}.teams{display:flex;align-items:center;justify-content:space-between;padding:8px 4%;gap:10px}.player-box{text-align:center;flex:1}.avatar{width:92px;height:92px;border-radius:50%;overflow:hidden;border:3px solid #fff;box-shadow:0 0 0 3px #FFD700,0 0 25px rgba(255,215,0,.7);margin:0 auto;position:relative;animation:avatarFloat 3s ease-in-out infinite}.avatar img{width:100%;height:100%;object-fit:cover}.player-name{color:#fff;font-weight:900;margin-top:8px;font-size:11px}.player-team{color:#FFD700;font-size:8px;font-weight:700;margin-top:2px}.t-center{display:flex;flex-direction:column;align-items:center;gap:6px}.trophy{font-size:38px;filter:drop-shadow(0 0 10px gold);animation:trophyGlow 2s infinite}.vs{background:#FFD700;color:#000;font-weight:900;padding:4px 14px;border-radius:999px;font-size:12px}.title{text-align:center;padding:4px 8px}.title h1{color:#fff;font-size:14px;line-height:1.5}.title h1 span{color:#FFD700}.countdown{display:flex;gap:7px;justify-content:center}.box{flex:1;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border:1px solid rgba(255,215,0,.4);border-radius:14px;padding:12px 2px;text-align:center}.num{font-weight:900;color:#fff;font-size:22px}.ar{color:#FFD700;font-size:9px;display:block;font-weight:800}.en{color:rgba(255,255,255,.6);font-size:6px;display:block}.broadcast{background:linear-gradient(90deg,rgba(255,215,0,.2),rgba(255,215,0,.08));border:1px solid rgba(255,215,0,.5);border-radius:12px;padding:10px 10px;display:flex;align-items:center;justify-content:center;gap:8px;animation:glow2 2s infinite}.dot{width:8px;height:8px;background:#00ff6a;border-radius:50%;box-shadow:0 0 10px #00ff6a;animation:blink 1s infinite}.broadcast span{color:#FFD700;font-weight:800;font-size:10.5px;text-align:center}.bottom{display:flex;justify-content:space-between;gap:6px}.pill{background:rgba(255,255,255,.12);color:#fff;border-radius:999px;padding:5px 10px;font-size:8.5px}.progress{position:absolute;bottom:0;left:0;height:4px;background:#FFD700;z-index:10;box-shadow:0 0 10px #FFD700}.video-overlay{position:absolute;top:158px;left:0;right:0;z-index:5;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .5s}.video-overlay.active{opacity:1}.video-text{background:rgba(0,0,0,.65);backdrop-filter:blur(12px);border:1px solid rgba(255,215,0,.4);color:#FFD700;padding:7px 12px;border-radius:9px;font-weight:800;font-size:10px;text-align:center;box-shadow:0 0 15px rgba(255,215,0,.3);transform:translateY(-8px) scale(.9);transition:all .4s;line-height:1.3}.video-overlay.active .video-text{transform:translateY(0) scale(1)}@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}@keyframes glow2{0%,100%{box-shadow:0 0 10px rgba(255,215,0,.15)}50%{box-shadow:0 0 22px rgba(255,215,0,.4)}}@keyframes logoPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}@keyframes avatarFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}@keyframes trophyGlow{0%,100%{filter:drop-shadow(0 0 10px gold)}50%{filter:drop-shadow(0 0 20px gold) brightness(1.2)}}
</style>
</head>
