<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK Sport Live</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        /* حاوية الفيديو الأساسية */
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        /* تكبير إطار يوتيوب لإخفاء الأزرار والشعار خارج حدود الشاشة */
        iframe {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            border: none;
            pointer-events: none; /* يمنع المشاهد من النقر لإظهار أزرار التحكم أو إيقاف الفيديو */
        }
        /* الشعار بعد تصغيره ونقله إلى أعلى يسار الشاشة */
        .watermark-logo {
            position: absolute;
            top: 20px; /* المسافة من الأعلى */
            left: 20px; /* تم نقله إلى اليسار */
            z-index: 9999; /* لضمان ظهوره فوق كل شيء */
            background-color: #4a148c; /* اللون البنفسجي لشعارك */
            color: #ffffff;
            font-weight: bold;
            font-size: 16px; /* تم تصغير حجم الخط */
            padding: 8px 18px; /* تم تصغير الأبعاد */
            border-radius: 50px; 
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            user-select: none;
            pointer-events: none; 
            letter-spacing: 0.5px;
            border: 2px solid #ffffff;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <iframe 
            src="https://www.youtube.com/embed/yfR_HprJx7s?autoplay=1&loop=1&playlist=yfR_HprJx7s&mute=1&controls=0&rel=0&showinfo=0&iv_load_policy=3&modestbranding=1" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>

        <div class="watermark-logo">
            MK SPORT
        </div>
    </div>

</body>
</html>
