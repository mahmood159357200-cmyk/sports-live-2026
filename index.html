<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>البث المباشر</title>
    <style>
        /* تصفير الهوامش وجعل الخلفية سوداء بالكامل */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden; /* إخفاء أشرطة التمرير */
            position: relative;
        }

        /* جعل المشغل يملأ كامل طول وعرض الشاشة */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* حاوية اللوجو بعرض الشاشة بالكامل */
        .logo-full-width {
            position: absolute;
            top: 20px;       /* المسافة من أعلى الشاشة */
            left: 0;
            width: 100vw;    /* جعل الحاوية بعرض الشاشة بالكامل */
            z-index: 10;     /* فوق الفيديو */
            display: flex;
            justify-content: center; /* توسيط اللوجو أفقياً (تغييرها لـ flex-end تجعله يميناً) */
            pointer-events: none;    /* عدم إعاقة النقر على الفيديو */
        }

        /* التحكم في حجم اللوجو الممتد */
        .logo-full-width img {
            width: 80%;          /* اللوجو سيأخذ 80% من عرض الشاشة، يمكنك جعلها 100% إن أردت */
            max-width: 600px;    /* حد أقصى للعرض على الشاشات الكبيرة حتى لا يتشوه */
            height: auto;
            display: block;
            opacity: 0.85;       /* شفافية خفيفة (85%) لكي لا يحجب تفاصيل الفيديو تماماً */
            filter: drop-shadow(0px 0px 8px rgba(0,0,0,0.8));
        }
    </style>
</head>
<body>

    <!-- حاوية الشعار الممتد بعرض الشاشة -->
    <div class="logo-full-width">
        <!-- استبدل logo.png برابط صورة شعار MK SPORT الخاص بك -->
        <img src="logo.png" alt="MK SPORT">
    </div>

    <iframe 
        src="https://player.syria-player.live/albaplayer/beinmax1/?serv=0" 
        allowfullscreen="true" 
        frameborder="0" 
        scrolling="no">
    </iframe>

</body>
</html>
