<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر مباراة فرنسا وإسبانيا</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* حاوية الفيديو بأبعاد 16:9 للحفاظ على العرض المناسب لشاشات التلفزيون */
        .video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* زر الشاشة الكاملة لتسهيل المشاهدة على الزوار */
        #fs-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            padding: 10px 15px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            font-family: sans-serif;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="video-wrapper">
    <button id="fs-btn" onclick="document.documentElement.requestFullscreen()">شاشة كاملة</button>
    <!-- السيرفر الجديد والبديل النشط حالياً -->
    <iframe src="https://korahub.live/albaplayer/kora/" 
            allowfullscreen="true" 
            scrolling="no" 
            frameborder="0"
            allow="autoplay; encrypted-media">
    </iframe>
</div>

</body>
</html>
