<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beIN SPORTS Live Player</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; font-family: sans-serif; color: white; }
        #player { width: 100%; height: 60vh; }
        .channel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 15px; }
        .btn-channel { background: #222; color: #fff; border: 1px solid #444; padding: 10px; text-align: center; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .btn-channel:hover { background: #e50914; border-color: #e50914; }
    </style>
</head>
<body>

    <div id="player"></div>

    <div class="channel-list">
        <!-- أزرار القنوات مع الروابط الخاصة بسيرفرك -->
        <div class="btn-channel" onclick="loadChannel('http://ugeen.live:8080/Ugeen_VIPDyFKsG/9BPK3X/459')">beIN 1 [H265]</div>
        <div class="btn-channel" onclick="loadChannel('http://ugeen.live:8080/Ugeen_VIPDyFKsG/9BPK3X/450')">beIN 2 [H265]</div>
        <div class="btn-channel" onclick="loadChannel('http://ugeen.live:8080/Ugeen_VIPDyFKsG/9BPK3X/451')">beIN 3 [H265]</div>
        <div class="btn-channel" onclick="loadChannel('http://ugeen.live:8080/Ugeen_VIPDyFKsG/9BPK3X/453')">beIN 4 [H265]</div>
        <div class="btn-channel" onclick="loadChannel('http://ugeen.live:8080/Ugeen_VIPDyFKsG/9BPK3X/3875')">beIN 5 [H265]</div>
        <div class="btn-channel" onclick="loadChannel('http://ugeen.live:8080/Ugeen_VIPDyFKsG/9BPK3X/455')">beIN 6 [H265]</div>
    </div>

    <script>
        var player = new Clappr.Player({
            source: 'http://ugeen.live:8080/Ugeen_VIPDyFKsG/9BPK3X/459',
            parentId: "#player",
            width: "100%",
            height: "100%",
            autoPlay: true
        });

        function loadChannel(url) {
            player.load(url);
            player.play();
        }
    </script>
</body>
</html>
